name: Instagram Viral Tracker

on:
  schedule:
    # 하루 1번 자동 실행 (UTC 0시 = 한국시간 오전 9시)
    - cron: "0 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run-instagram-tracker:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install requests

      - name: 인스타그램 트래커 실행
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: python instagram_tracker.py

      - name: 결과 커밋
        if: always()
        run: |
          if [ -f instagram_results.csv ]; then
            git config user.name "viral-tracker-bot"
            git config user.email "bot@example.com"
            git add instagram_results.csv
            git commit -m "update instagram results $(date -u)" || echo "변경사항 없음"
            git push
          fi
